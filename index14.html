<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temperature Converter - Rayner</title>
    <style>
        /* Base Reset & Variables */
        :root {
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #202124;
            --border: #dadce0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        /* Container Card */
        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 360px; /* Perfect for iPhone SE and Desktop */
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        h2 {
            margin: 0 0 20px 0;
            text-align: center;
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 700;
        }

        /* Form Elements */
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #5f6368;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fff;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        /* Result Section */
        .result-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px dashed var(--border);
        }

        .result-box p {
            margin: 0;
            font-size: 0.9rem;
            color: #5f6368;
        }

        #hasil {
            display: block;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark);
            margin-top: 5px;
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Responsive Tweaks */
        @media (max-width: 330px) {
            .container {
                padding: 20px 15px;
            }
            h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Konversi Suhu</h2>
        
        <label for="s1">Input Suhu</label>
        <input id="s1" type="number" placeholder="Contoh: 32">

        <label for="awal">Dari Satuan:</label>
        <select id="awal">
           <option value="celcius">Celcius (°C)</option>
           <option value="reamur">Reamur (°R)</option>
           <option value="fahrenheit">Fahrenheit (°F)</option>
           <option value="kelvin">Kelvin (K)</option>
        </select>

        <label for="ke">Ke Satuan:</label>
        <select id="ke">
           <option value="celcius">Celcius (°C)</option>
           <option value="reamur">Reamur (°R)</option>
           <option value="fahrenheit">Fahrenheit (°F)</option>
           <option value="kelvin">Kelvin (K)</option>
        </select>

        <div class="result-box">
            <p>Hasil Konversi:</p>
            <span id="hasil">---</span>
        </div>

        <button onclick="hitung()">Hitung Sekarang</button>
    </div>

    <script>
        function hitung() { 
            let suhu1 = parseFloat(document.getElementById("s1").value);
            let awal = document.getElementById("awal").value;
            let ke = document.getElementById("ke").value;
            let display = document.getElementById('hasil');

            if (isNaN(suhu1)) {
                display.innerHTML = "Masukkan angka!";
                return;
            }

            let hasilValue;
            let unitLabel = ke.charAt(0).toUpperCase() + ke.slice(1);

            // Logic Celcius
            if(awal === 'celcius'){
                if(ke === 'kelvin') hasilValue = suhu1 + 273.15;
                else if (ke === 'fahrenheit') hasilValue = (9/5) * suhu1 + 32;
                else if (ke === 'reamur') hasilValue = (4/5) * suhu1;
                else hasilValue = suhu1;
            }

            // Logic Reamur
            else if(awal === 'reamur'){
                if(ke === 'celcius') hasilValue = (5/4) * suhu1;
                else if (ke === 'kelvin') hasilValue = (5/4) * suhu1 + 273.15;
                else if (ke === 'fahrenheit') hasilValue = (9/4) * suhu1 + 32;
                else hasilValue = suhu1;
            }

            // Logic Fahrenheit
            else if(awal === 'fahrenheit'){
                if(ke === 'celcius') hasilValue = (5/9) * (suhu1 - 32);
                else if (ke === 'kelvin') hasilValue = (5/9) * (suhu1 - 32) + 273.15;
                else if (ke === 'reamur') hasilValue = (4/9) * (suhu1 - 32);
                else hasilValue = suhu1;
            }

            // Logic Kelvin
            else if(awal === 'kelvin'){
                if(ke === 'celcius') hasilValue = suhu1 - 273.15;
                else if (ke === 'fahrenheit') hasilValue = (9/5) * (suhu1 - 273.15) + 32;
                else if (ke === 'reamur') hasilValue = (4/5) * (suhu1 - 273.15);
                else hasilValue = suhu1;
            }

            // Display formatted result
            display.innerHTML = hasilValue.toFixed(2) + " " + unitLabel;
        }
    </script>
</body>
</html>
