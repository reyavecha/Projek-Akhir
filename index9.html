<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumah Sakit Indonesia Raya</title>
    <style>
        /* --- General Reset & Styling --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 30px;
            color: #2c3e50;
            text-align: center;
        }

        /* --- Responsive Grid --- */
        .all {
            display: flex;
            flex-wrap: wrap; /* Allows cards to wrap to the next line on mobile */
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
        }

        /* --- Card Styling --- */
        .satu {
            background-color: #ffffff;
            flex: 1; /* Grows to fill space */
            min-width: 300px; /* Prevents card from getting too thin */
            padding: 40px 20px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-top: 8px solid #00b894; /* Professional accent color */
        }

        h3 {
            font-size: 1.5rem;
            color: #636e72;
            margin-bottom: 10px;
        }

        p {
            font-size: 80pt; /* Large queue number */
            font-weight: bold;
            color: #2d3436;
            margin: 20px 0;
        }

        /* --- Button Container & Styling --- */
        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #dfe6e9 !important;
            cursor: not-allowed;
            color: #b2bec3;
        }

        /* Specific Colors */
        .btn-plus {
            background-color: #00b894;
            color: white;
            width: 60px;
            height: 60px;
            font-size: 30px;
        }

        .btn-minus {
            background-color: #d63031;
            color: white;
            width: 60px;
            height: 60px;
            font-size: 30px;
        }

        .btn-reset {
            background-color: #636e72;
            color: white;
            padding: 0 25px;
            height: 60px;
            font-size: 18px;
        }

        /* Mobile Specific Adjustment */
        @media (max-width: 600px) {
            p {
                font-size: 60pt;
            }
            .satu {
                min-width: 100%; /* Stack cards on very small screens */
            }
        }
    </style>
</head>
<body>

    <h1>Rumah Sakit Indonesia Raya</h1>

    <div class="all">
        <div class="satu">
            <h3>Counter 1</h3>
            <p id="number">D0</p>
            <div class="button-group">
                <button class="btn-minus" id="minus" onclick="kurang()">-</button>
                <button class="btn-reset" id="reset" onclick="reset()">Reset</button>
                <button class="btn-plus" id="plus" onclick="tambah()">+</button>
            </div>
        </div>

        <div class="satu">
            <h3>Counter 2</h3>
            <p id="number2">A0</p>
            <div class="button-group">
                <button class="btn-minus" id="minus2" onclick="kurang2()">-</button>
                <button class="btn-reset" id="reset2" onclick="reset2()">Reset</button>
                <button class="btn-plus" id="plus2" onclick="tambah2()">+</button>
            </div>
        </div>
    </div>

    <script>
        // Counter 1 Logic
        let number1 = 0;
        function ubahTampilan(){
            document.getElementById('number').textContent = `D${number1}`;
            document.getElementById('plus').disabled = number1 === 10;
            document.getElementById('minus').disabled = number1 === 0;
        }

        function tambah(){
            if(number1 < 10) { number1++; ubahTampilan(); }
        }
        function kurang(){
            if(number1 > 0) { number1--; ubahTampilan(); }
        }
        function reset(){
            number1 = 0; ubahTampilan();
        }

        // Counter 2 Logic
        let number2 = 0;
        function ubahTampilan2(){
            document.getElementById('number2').textContent = `A${number2}`;
            document.getElementById('plus2').disabled = number2 === 10;
            document.getElementById('minus2').disabled = number2 === 0;
        }

        function tambah2(){
            if(number2 < 10) { number2++; ubahTampilan2(); }
        }
        function kurang2(){
            if(number2 > 0) { number2--; ubahTampilan2(); }
        }
        function reset2(){
            number2 = 0; ubahTampilan2();
        }

        // Run once on load to set button states
        ubahTampilan();
        ubahTampilan2();
    </script>
</body>
</html>
