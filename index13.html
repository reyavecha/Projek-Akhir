<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Navbar by Rayner Junio Gunawan 7G</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <input type="radio" name="s" id="home" checked>
        <input type="radio" name="s" id="blog">
        <input type="radio" name="s" id="code">
        <input type="radio" name="s" id="help">
        <input type="radio" name="s" id="about">
        <!-- Bagian Navbar -->
         <nav>
            <!-- Kotak Slider Animasi -->
             <div class="slider"></div>
             <label class="home" for="home">Home</label>
             <label class="blog" for="blog">Blog</label>
             <label class="code" for="code">Code</label>
             <label class="help" for="help">Help</label>
             <label class="about" for="about">About</label>
         </nav>
    </div>
</body>
</html>
