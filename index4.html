<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Password Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        h2 {
            color: #1e293b;
            text-align: center;
            font-size: 1.75rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 10px;
        }

        /* Input Sections */
        .setting-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            color: #475569;
        }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* Buttons */
        .button-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:first-child {
            background-color: var(--primary);
            color: white;
        }

        button:first-child:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:last-child {
            background-color: #f1f5f9;
            color: #64748b;
        }

        button:last-child:hover {
            background-color: #e2e8f0;
        }

        /* Result Area */
        .output-box {
            margin-top: 25px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #1e293b;
            min-height: 24px;
        }

        /* Responsiveness */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h2 {
                font-size: 1.4rem;
            }

            .button-wrapper {
                grid-template-columns: 1fr; /* Stack buttons on very small screens */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Password Generator</h2>
        
        <div class="setting-group">
            <label>Length</label>
            <input type="number" id="len" value="12" min="6" max="50">
        </div>

        <div class="setting-group">
            <label>Uppercase</label>
            <input type="checkbox" id="upper" checked>
        </div>

        <div class="setting-group">
            <label>Numbers</label>
            <input type="checkbox" id="nums" checked>
        </div>

        <div class="setting-group">
            <label>Special Characters</label>
            <input type="checkbox" id="special" checked>
        </div>

        <div class="button-wrapper">
            <button onclick="generate()">Generate</button> 
            <button onclick="reset()">Reset</button>
        </div>

        <div class="output-box" id="passOut">Click Generate</div>
    </div>

    <script>
        function genPass(len, upper, nums, special){
            const lower = "abcdefghijklmnopqrstuvwxyz";
            const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const numChars = "0123456789";
            const specialChars = "!@#$%^&*()_+|?<>:;{}[]-=";
            
            let chars = lower;
            if(upper) chars += upperChars;
            if(nums) chars += numChars;
            if(special) chars += specialChars;

            let pass = "";
            for (let i = 0; i < len; i++){
                const randInt = Math.floor(Math.random() * chars.length);
                pass += chars[randInt];
            }
            return pass;
        }

        function generate(){
            const lenInput = document.getElementById("len");
            let len = parseInt(lenInput.value);
            
            // Safety check for length
            if(isNaN(len) || len < 6) { len = 6; lenInput.value = 6; }
            if(len > 50) { len = 50; lenInput.value = 50; }

            const upper = document.getElementById("upper").checked;
            const nums = document.getElementById("nums").checked;
            const special = document.getElementById("special").checked;

            const pass = genPass(len, upper, nums, special);
            const display = document.getElementById('passOut');
            display.textContent = pass;
            display.style.color = "#6366f1"; // Highlight color
        }

        function reset(){
            document.getElementById("len").value = 12;
            document.getElementById("upper").checked = true;
            document.getElementById("nums").checked = true;
            document.getElementById("special").checked = true;
            const display = document.getElementById("passOut");
            display.textContent = "Click Generate";
            display.style.color = "#1e293b";
        }
    </script>
</body>
</html>
